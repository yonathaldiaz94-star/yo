<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liga Premier UY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="styles2.css">
</head>
<body>

<div class="container">

<div class="header">
  <div class="logo">
    <img src="logo.png" class="logo-img" alt="Logo">

    <div>
      <h1>Liga Premier UY</h1>
      <span>Temporada 2025/26 · Jornada 18 de 30</span>
    </div>
  </div>

  <button class="btn btn-green" onclick="openModal()">
    <i class="ti ti-plus"></i> Registrar resultado
  </button>
</div>

<div class="metrics">
  <div class="metric">
    <div class="metric-label">Equipos</div>
    <div class="metric-value">2</div>
    <div class="metric-sub">En competencia</div>
  </div>

  <div class="metric">
    <div class="metric-label">Partidos jugados</div>
    <div class="metric-value">1</div>
    <div class="metric-sub">de 2 Totales</div>
  </div>

  <div class="metric">
    <div class="metric-label">Goles totales</div>
    <div class="metric-value">Por registrar</div>
    <div class="metric-sub">-</div>
  </div>

  <div class="metric">
    <div class="metric-label">Próximo Partido</div>
    <div class="metric-value">NAC vs PEÑ</div>
    <div class="metric-sub">Viernes 2</div>
  </div>
</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('tabla', this)">
      <i class="ti ti-table"></i> Tabla
    </button>
    <button class="tab" onclick="showTab('partidos', this)">
      <i class="ti ti-calendar"></i> Partidos
    </button>
    <button class="tab" onclick="showTab('goleadores', this)">
      <i class="ti ti-shirt"></i> Goleadores
    </button>
  </div>

  <div id="tabla" class="section active">
    <div class="card">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th style="width:36px">#</th>
              <th>Equipo</th>
              <th style="text-align:center">PJ</th>
              <th style="text-align:center">G</th>
              <th style="text-align:center">E</th>
              <th style="text-align:center">P</th>
              <th style="text-align:center">GF</th>
              <th style="text-align:center">GC</th>
              <th style="text-align:center">+/-</th>
              <th style="text-align:center">Pts</th>
              <th>Forma</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="partidos" class="section">
    <div class="card">
      <div style="padding:12px 16px" id="partidos-j18"></div>
    </div>
    <div class="card">
      <div style="padding:12px 16px" id="partidos-j19"></div>
    </div>
  </div>

  <div id="goleadores" class="section">
    <div class="card">
      <div id="goleadores-list"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3><i class="ti ti-plus"></i> Registrar resultado</h3>
    <div class="input-row">
      <div class="input-group" style="flex:2">
        <label>Equipo local</label>
        <select id="m-local">
  <option>Nacional</option>
  <option>Peñarol</option>
</select>
      </div>
      <div class="input-group" style="flex:0 0 70px">
        <label>Goles</label>
        <input type="number" id="m-gl" min="0" max="20" value="0" style="text-align:center">
      </div>
    </div>
    <div class="input-row">
      <div class="input-group" style="flex:2">
        <label>Equipo visitante</label>
        <select id="m-visit">
  <option>Peñarol</option>
  <option>Nacional</option>
</select>
      </div>
      <div class="input-group" style="flex:0 0 70px">
        <label>Goles</label>
        <input type="number" id="m-gv" min="0" max="20" value="0" style="text-align:center">
      </div>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>Jornada</label>
        <input type="number" id="m-jornada" value="18" min="1" max="30">
      </div>
      <div class="input-group">
        <label>Fecha</label>
        <input type="date" id="m-fecha" value="2026-06-05">
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="saveResult()">
        <i class="ti ti-check"></i> Guardar
      </button>
    </div>
  </div>
</div>

<div class="notif" id="notif"><i class="ti ti-check"></i> Resultado guardado</div>

<script src="script2.js"></script>
</body>
</html>
